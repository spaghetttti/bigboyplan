services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: devtrack
      POSTGRES_PASSWORD: devtrack
      POSTGRES_DB: devtrack
    ports:
      - "5432:5432"
    volumes:
      - devtrack_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtrack -d devtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  devtrack_pgdata:
